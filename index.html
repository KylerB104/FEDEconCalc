<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FED Econ Calc</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Mockgov Economic Team</p>
        <h1>FED Econ Calc</h1>
      </div>
      <div class="top-actions">
        <button id="openTutorial" type="button">Walkthrough</button>
        <button id="exampleFill" type="button">Example Fill</button>
        <button id="importData" type="button">Import Data</button>
        <button id="exportData" type="button">Export Data</button>
        <button id="exportAll" type="button">Export All</button>
      </div>
    </header>
    <input id="importFile" type="file" accept="application/json,.json" hidden />

    <main>
      <section class="overview" id="overview">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Overall</p>
            <h2>All-Region Comparison</h2>
          </div>
          <label class="mini-field">
            <span>Compare</span>
            <select id="overviewMetric">
              <option value="gdp">GDP growth</option>
              <option value="budget">Budget result</option>
              <option value="jobs">Jobs</option>
              <option value="strain">Household strain</option>
            </select>
          </label>
        </div>
        <div class="overview-grid">
          <article class="chart-card">
            <canvas id="overviewChart" width="980" height="360"></canvas>
          </article>
          <article class="scoreboard" id="scoreboard"></article>
        </div>
      </section>

      <nav class="jump-nav" id="jumpNav" aria-label="Region jump links"></nav>

      <section class="regions-board" id="regionsBoard"></section>
    </main>

    <dialog class="tutorial-modal" id="tutorialModal">
      <div class="tutorial-shell">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Walkthrough</p>
            <h2 id="tutorialTitle"></h2>
          </div>
          <button id="closeTutorial" type="button">Close</button>
        </div>
        <p id="tutorialBody"></p>
        <div class="tutorial-progress" id="tutorialProgress"></div>
        <div class="tutorial-actions">
          <button id="prevTutorial" type="button">Previous</button>
          <button id="nextTutorial" type="button">Next</button>
        </div>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
